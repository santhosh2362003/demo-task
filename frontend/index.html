<!DOCTYPE html>
<html>
<head>
    <title>My Fullstack App</title>
    <style>
        body { font-family: Arial; text-align: center; background-color: #f4f4f4; }
        .container { margin-top: 50px; background: white; padding: 20px; display: inline-block; border-radius: 10px; }
        h1 { color: #333; }
        #message { color: blue; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Jenkins Master-Agent Task</h1>
        <p>Status: <span id="message">Loading from Backend...</span></p>
    </div>

    <script>
        // Backend API-ah call pannudhu
        fetch('/api/data')
            .then(res => res.json())
            .then(data => {
                document.getElementById('message').innerText = data.message;
            })
            .catch(err => {
                document.getElementById('message').innerText = "Backend Connection Failed!";
            });
    </script>
</body>
</html>
